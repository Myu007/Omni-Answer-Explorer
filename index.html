<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>Omni-Answer Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   TOKENS & THEME
   ============================================================ */
:root {
  --purple: #6C4FF4;
  --purple-light: #EEE9FD;
  --purple-bg: rgba(108,79,244,0.08);
  --ai1: #3B82F6; --ai1-bg: rgba(59,130,246,0.08);
  --ai2: #10B981; --ai2-bg: rgba(16,185,129,0.08);
  --ai3: #EF4444; --ai3-bg: rgba(239,68,68,0.08);
  --ai4: #F59E0B; --ai4-bg: rgba(245,158,11,0.08);
  --bg: #F4F5F7;
  --card: #FFFFFF;
  --card-hover: #FAFBFC;
  --text: #0B0D14;
  --text-secondary: #3D4352;
  --text-muted: #6B7280;
  --border: #E1E3E8;
  --border-light: #F0F1F4;
  --sidebar-w: 240px;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.03);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.03);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.08);
  --shadow-glow: 0 0 0 3px rgba(108,79,244,0.15);
  --font: 'Inter', system-ui, -apple-system, sans-serif;
  --t: 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
  --mobile-bar: 56px;
}

[data-theme="dark"] {
  --purple: #8B7CF7;
  --purple-light: #2D2A5E;
  --purple-bg: rgba(139,124,247,0.12);
  --bg: #09090B;
  --card: #121214;
  --card-hover: #18181B;
  --text: #F8FAFC;
  --text-secondary: #94A3B8;
  --text-muted: #64748B;
  --border: #27272A;
  --border-light: #1E1E20;
  --shadow: 0 4px 20px rgba(0,0,0,0.4);
  --shadow-md: 0 8px 30px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 0 3px rgba(139,124,247,0.25);
}

/* ============================================================
   BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  font-family: var(--font);
  font-size: 15px;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  display: flex;
  overflow: hidden;
  height: 100%;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ============================================================
   LANDING
   ============================================================ */
.landing {
  position: fixed; inset: 0; z-index: 200;
  display: flex; flex-direction: column;
  background: var(--bg);
  transition: opacity 0.4s ease, visibility 0.4s;
  opacity: 1; visibility: visible;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.landing.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.landing-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 5% 10%, rgba(108,79,244,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 95% 90%, rgba(59,130,246,0.04) 0%, transparent 70%);
  pointer-events: none;
}
[data-theme="dark"] .landing-bg {
  background:
    radial-gradient(ellipse 60% 50% at 5% 10%, rgba(139,124,247,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 95% 90%, rgba(59,130,246,0.05) 0%, transparent 70%);
}

.landing-body {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  width: 100%; min-height: 100%;
  padding: 48px 20px 40px;
}
.landing-content { text-align: center; max-width: 760px; width: 100%; }
.landing-brand { margin-bottom: 24px; }

.landing-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 64px; height: 64px; border-radius: 20px;
  background: linear-gradient(135deg, #6C4FF4, #3B82F6);
  color: #fff; margin-bottom: 20px;
  box-shadow: 0 8px 32px rgba(108,79,244,0.25);
}
.landing-icon svg { width: 32px; height: 32px; }

.landing-title {
  font-size: clamp(28px, 4.5vw, 44px);
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.03em;
  line-height: 1.15;
  margin-bottom: 12px;
}
.landing-subtitle {
  font-size: clamp(14px, 2vw, 16px);
  color: var(--text-secondary);
  line-height: 1.5;
}
.landing-disclaimer {
  margin: 16px auto 32px;
  font-size: 12px;
  color: var(--text-muted);
  max-width: 520px;
  line-height: 1.6;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card);
}
.landing-prompt {
  display: flex; align-items: center; justify-content: center; gap: 16px;
  margin-bottom: 24px;
  font-size: 11px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700;
}
.landing-prompt-line { display: block; width: 48px; height: 1px; background: var(--border); }

.landing-cards {
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
  gap: 12px;
  margin-bottom: 32px;
}
.landing-card {
  display: flex; align-items: center; gap: 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: transform var(--t), box-shadow var(--t), border-color var(--t);
  box-shadow: var(--shadow);
  text-align: left;
  -webkit-tap-highlight-color: transparent;
}
.landing-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
  border-color: var(--purple);
}
.landing-card:active { transform: translateY(-1px) scale(0.98); }
.landing-card-icon {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.landing-card-info { min-width: 0; }
.landing-card-name { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.landing-card-meta { font-size: 12px; color: var(--text-muted); font-weight: 500; }

/* Theme Toggle Button */
.theme-btn-shared {
  display: inline-flex; align-items: center; justify-content: center;
  width
